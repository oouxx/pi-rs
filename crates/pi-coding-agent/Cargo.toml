[package]
name = "pi-coding-agent"
version = "1.78.0"
edition = "2021"
description = "Coding agent CLI with read/bash/edit/write tools and session management (Rust port of @earendil-works/pi-coding-agent)"
license = "MIT"

[dependencies]
pi-agent-core = { path = "../pi-agent-core" }
pi-ai = { path = "../pi-ai" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
thiserror = "2"
async-trait = "0.1"
futures = "0.3"
glob = "0.3"
regex = "1"
dirs = "6"
similar = "2"
unicode-normalization = "0.1"
url = "2"
fs2 = "0.4"
colored = "3"
pi-tui = { path = "../pi-tui" }
crossterm = "0.28"
base64 = "0.22"
reqwest = { version = "0.11", default-features = false, features = ["json", "rustls-tls"] }

[dev-dependencies]
tempfile = "3"
